<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center mb-4">📝 Todo App</h1>

    <!-- 入力フォーム -->
    <form action="/" method="post" class="mb-4 d-flex">
        <input type="text" name="task" class="form-control me-2" placeholder="タスクを入力">
        <button type="submit" class="btn btn-primary">追加</button>
    </form>

    <ul class="list-group">
        {% for task in tasks %}
            <li class="list-group-item d-flex justify-content-between align-items-center">

                <form action="/" method="post" class="d-flex align-items-center">
            
                    <input type="hidden" name="completed_id" value="{{ task['id'] }}">

                    <input type="checkbox"
                        onchange="this.form.submit()"
                        {% if task['completed'] %}checked{% endif %}>

                        <span class="ms-2 {% if task['completed'] %}text-decoration-line-through{% endif %}">
                            {{ task["task"] }}
                        </span>
                </form>
                <!-- 削除 -->
                <form action="/" method="post">
                    <input type="hidden" name="delete_id" value="{{ task['id'] }}">
                    <button type="submit" class="btn btn-danger btn-sm">削除</button>
                </form>
            </li>
        {% endfor %}
    </ul>

    <div class="my-4 text-center">
        <a href="/?filter=all" class="btn btn-secondary">すべて</a>
        <a href="/?filter=incomplete" class="btn btn-warning">未完了</a>
        <a href="/?filter=completed" class="btn btn-success">完了</a>
    </div>
    
</div>

</body>
</html>
