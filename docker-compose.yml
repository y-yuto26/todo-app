version: '3'

services:
  web:
    build: .
    ports:
      - "80:8000"
    depends_on:
      - db
    env_file:
      - .env.web

  db:
    image: mysql:8
    env_file:
      - .env.db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data: